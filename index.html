<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ระบบตารางจัดบิน ฝูงบิน 69</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#0f172a;font-family:'Sarabun','Segoe UI',sans-serif}

  /* ─── Splash ─── */
  #splash{
    position:fixed;inset:0;z-index:10;
    background:#0f172a;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:0;transition:opacity .5s ease;
  }
  #splash.hide{opacity:0;pointer-events:none}
  .sp-heli{font-size:3rem;animation:hfly 2.4s ease-in-out infinite;margin-bottom:18px}
  @keyframes hfly{0%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}70%{transform:translateY(4px)}}
  .sp-title{font-size:1.3rem;font-weight:700;color:#93c5fd;margin-bottom:4px}
  .sp-sub{font-size:.82rem;color:#475569;margin-bottom:28px}
  .sp-bar-wrap{width:220px;height:3px;background:#1e293b;border-radius:2px;overflow:hidden;margin-bottom:12px}
  .sp-bar{height:100%;width:0;background:linear-gradient(90deg,#1d4ed8,#3b82f6);border-radius:2px;animation:fill 2.5s ease forwards}
  @keyframes fill{0%{width:0}60%{width:70%}100%{width:95%}}
  .sp-msg{font-size:.75rem;color:#64748b}
  .sp-open{
    margin-top:24px;padding:9px 22px;background:#3b82f6;color:#fff;
    border:none;border-radius:8px;font-size:.85rem;font-weight:700;
    font-family:inherit;cursor:pointer;display:none;
    text-decoration:none;
  }
  .sp-open:hover{background:#2563eb}

  /* ─── iFrame ─── */
  iframe{
    position:fixed;inset:0;width:100%;height:100%;
    border:none;z-index:5;
  }
</style>
</head>
<body>

<!-- Splash screen -->
<div id="splash">
  <div class="sp-heli">🚁</div>
  <div class="sp-title">ระบบตารางจัดบิน</div>
  <div class="sp-sub">ฝูงบิน 69 · กำลังเชื่อมต่อ…</div>
  <div class="sp-bar-wrap"><div class="sp-bar" id="sp-bar"></div></div>
  <div class="sp-msg" id="sp-msg">กำลังโหลดระบบ…</div>
  <a id="sp-open"
     class="sp-open"
     href="https://script.google.com/macros/s/AKfycbwmWCuLUVIl8Yz3RQLufcz6g160ImqbzxeVfnVYquScTIHr5Fz6eKUj-orL1JajiUQwPA/exec"
     target="_blank">
    เปิดในแท็บใหม่ ↗
  </a>
</div>

<!-- App iframe -->
<iframe
  id="frame"
  src="https://script.google.com/macros/s/AKfycbwmWCuLUVIl8Yz3RQLufcz6g160ImqbzxeVfnVYquScTIHr5Fz6eKUj-orL1JajiUQwPA/exec"
  title="ระบบตารางจัดบิน ฝูงบิน 69"
  allowfullscreen
  onload="frameLoaded()"
></iframe>

<script>
var frameTimer;

function frameLoaded() {
  clearTimeout(frameTimer);
  document.getElementById('sp-bar').style.width = '100%';
  document.getElementById('sp-bar').style.transition = 'width .3s ease';
  document.getElementById('sp-msg').textContent = 'พร้อมใช้งาน ✓';
  setTimeout(function(){
    var s = document.getElementById('splash');
    s.classList.add('hide');
    setTimeout(function(){ s.style.display='none'; }, 500);
  }, 400);
}

// Fallback: ถ้า iframe ไม่ตอบสนองใน 12 วินาที แสดงปุ่มเปิดในแท็บใหม่
frameTimer = setTimeout(function() {
  document.getElementById('sp-msg').textContent = 'หากรอนานเกินไป กด "เปิดในแท็บใหม่"';
  document.getElementById('sp-open').style.display = 'inline-block';
  document.getElementById('sp-bar').style.background = '#f59e0b';
}, 12000);
</script>

</body>
</html>
